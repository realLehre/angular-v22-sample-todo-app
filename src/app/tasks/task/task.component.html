<div class="max-w-sm mx-auto bg-white p-4 rounded-lg shadow-sm flex items-start gap-4">
  <input type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded" aria-label="Completed" [checked]="task()?.completed"/>
  <div>
    <h3 class="text-lg font-medium">{{ task()?.name }}</h3>
    <p class="text-sm text-gray-600">{{ task()?.description }}</p>
  </div>
</div>
