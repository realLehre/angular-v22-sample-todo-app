<div class="max-w-sm mx-auto bg-white p-4 rounded-lg shadow-sm flex items-center justify-between gap-4">
  <div>
    <input type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded" aria-label="Completed" [checked]="task()?.completed"/>
    <div>
      <h3 class="text-lg font-medium">{{ task()?.name }}</h3>
      <p class="text-sm text-gray-600">{{ task()?.description }}</p>
    </div>
  </div>
  
  <div class="flex items-center gap-x-4">
    <button class="cursor-pointer" (click)="onEdit()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="fill-amber-900 w-4 h-4">
        <path d="M36.4 353.2c4.1-14.6 11.8-27.9 22.6-38.7l181.2-181.2 33.9-33.9c16.6 16.6 51.3 51.3 104 104l33.9 33.9-33.9 33.9-181.2 181.2c-10.7 10.7-24.1 18.5-38.7 22.6L30.4 510.6c-8.3 2.3-17.3 0-23.4-6.2S-1.4 489.3 .9 481L36.4 353.2zm55.6-3.7c-4.4 4.7-7.6 10.4-9.3 16.6l-24.1 86.9 86.9-24.1c6.4-1.8 12.2-5.1 17-9.7L91.9 349.5zm354-146.1c-16.6-16.6-51.3-51.3-104-104L308 65.5C334.5 39 349.4 24.1 352.9 20.6 366.4 7 384.8-.6 404-.6S441.6 7 455.1 20.6l35.7 35.7C504.4 69.9 512 88.3 512 107.4s-7.6 37.6-21.2 51.1c-3.5 3.5-18.4 18.4-44.9 44.9z"/>
      </svg>
    </button>
    
    <button class="cursor-pointer" (click)="onDelete()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" class="fill-red-700 w-4 h-4">
        <path d="M432 32H312l-9.4-18.7A24 24 0 0 0 281.1 0H166.8a23.72 23.72 0 0 0-21.4 13.3L136 32H16A16 16 0 0 0 0 48v32a16 16 0 0 0 16 16h416a16 16 0 0 0 16-16V48a16 16 0 0 0-16-16zM53.2 467a48 48 0 0 0 47.9 45h245.8a48 48 0 0 0 47.9-45L416 128H32z"/>
      </svg>
    </button>
  </div>
</div>
